version: 0.2

# NixOS AMI generation — all logic in nix run .#build-ami
#
# Environment variables (set by CodeBuild project):
#   ARTIFACTS_BUCKET, AMI_NAME, SSM_PARAMETER_NAME, VMIMPORT_ROLE_NAME
#   GITHUB_TOKEN — for fetching private flake inputs

phases:
  install:
    commands:
      - curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | sh -s -- install linux --no-confirm --init none
      - . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
      - nix-daemon &
      - sleep 2
      - mkdir -p ~/.config/nix
      - echo "access-tokens = github.com=${GITHUB_TOKEN}" >> ~/.config/nix/nix.conf

  build:
    commands:
      - . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
      - nix run .#build-ami --no-write-lock-file
